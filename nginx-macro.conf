# Nginx Macro API Proxy Block (OPTIONAL — not used in direct-IP mode)
# Only needed if you want to proxy via a domain name.
# Save on the VPS at: /etc/nginx/sites-available/<your-domain>
#
# Production checklist:
#   - Public clients need: /auth /heartbeat /update /health
#   - Admin paths below must stay blocked from the internet
#   - Discord bot on the same host can call admin via localhost:8081

server {
    listen 80;
    server_name <your-domain-here>;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy no-referrer;

    # Block all admin endpoints from public internet.
    # Admin ops (or Discord bot) should hit localhost:8081 directly:
    #   curl -H "Authorization: <ADMIN_PASS>" "http://127.0.0.1:8081/create_key?days=30&product=recoil"
    location ~ ^/(create_key|reset_hwid|extend_key|revoke_key|key_hwid|product_ready) {
        return 403;
    }

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300;
        proxy_connect_timeout 10;
    }
}
