# ===================================================
# License / auth server — Coolify compose
# Secrets via Coolify env (PRIVATE_PEM, ADMIN_PASS, AES/HMAC, …)
# ===================================================
name: macro-server

services:
  macro-auth:
    build: .
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      PORT: "8080"
      APP_VERSION: ${APP_VERSION:-1.0.0}
      AES_SECRET_KEY: ${AES_SECRET_KEY}
      HMAC_SECRET_SALT: ${HMAC_SECRET_SALT}
      ADMIN_PASS: ${ADMIN_PASS}
      LICENSE_KEY_PREFIX: ${LICENSE_KEY_PREFIX:-SLYNX}
      DEFAULT_PRODUCT_ID: ${DEFAULT_PRODUCT_ID:-recoil}
      DISCORD_WEBHOOK: ${DISCORD_WEBHOOK:-}
      PRIVATE_PEM: ${PRIVATE_PEM:-}
    volumes:
      - app_db:/app/db
      - ./products:/app/products:ro
      - ./payload.ahk:/app/payload.ahk:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  app_db:
